<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: #1a1a1a;
      background: #f8f9fa;
    }

    header {
      background: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #4f46e5;
    }

    nav a {
      margin-left: 1.5rem;
      text-decoration: none;
      color: #374151;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #4f46e5;
    }

    .hero {
      text-align: center;
      padding: 6rem 2rem 4rem;
      background: linear-gradient(135deg, #eef2ff 0%, #f0fdf4 100%);
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #6b7280;
      max-width: 560px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      margin-right: 1rem;
    }

    .btn-outline {
      border: 2px solid #4f46e5;
      color: #4f46e5;
      background: transparent;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 4rem 2rem;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 260px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
    }

    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #111827;
    }

    .card p {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #9ca3af;
      font-size: 0.85rem;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">My Tool</span>
    <nav>
      <a href="#">機能</a>
      <a href="#">料金</a>
      <a href="#">お問い合わせ</a>
    </nav>
  </header>

  <section class="hero">
    <h1>作業をもっとシンプルに</h1>
    <p>My Tool は、日々のタスクを自動化して生産性を高めるためのシンプルなツールです。</p>
    <a href="#" class="btn btn-primary">無料で始める</a>
    <a href="#" class="btn btn-outline">詳しく見る</a>
  </section>

  <section class="features">
    <div class="card">
      <div class="icon">⚡</div>
      <h3>高速処理</h3>
      <p>ストレスなく使える軽快な動作で、作業効率を向上させます。</p>
    </div>
    <div class="card">
      <div class="icon">🔒</div>
      <h3>安全・安心</h3>
      <p>データは暗号化して保護。プライバシーを最優先に設計しています。</p>
    </div>
    <div class="card">
      <div class="icon">🛠️</div>
      <h3>カスタマイズ</h3>
      <p>あなたのワークフローに合わせて自由に設定できます。</p>
    </div>
  </section>

  <footer>
    &copy; 2026 My Tool. All rights reserved.
  </footer>

</body>
</html>
